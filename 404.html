<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة — مؤتمر الشباب</title>
    <link rel="icon" type="image/png" href="assets/img/logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-dark) 50%, var(--bg-deepest) 100%);
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 420px;
        }
        .error-code {
            font-size: clamp(5rem, 20vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: block;
            opacity: 0.7;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }
        .error-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0.85rem 2rem;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--primary-glow);
        }
        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px var(--primary-glow);
            color: white;
        }
        .home-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <i class="bi bi-map error-icon"></i>
        <div class="error-title">الصفحة مش موجودة</div>
        <p class="error-subtitle">يبدو إن الرابط ده باظ أو اتنقل لمكان تاني</p>
        <a href="pages/home.html" class="home-btn">
            <i class="bi bi-house-fill"></i>
            ارجع للرئيسية
        </a>
    </div>
</body>
</html>
