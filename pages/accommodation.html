<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="التسكين والغرف — مؤتمر الشباب 2026">
    <title>التسكين — مؤتمر الشباب</title>
    <link rel="icon" type="image/png" href="../assets/img/logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <style>
        /* ────── شريط الفلتر ────── */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            overflow-x: auto;
            scrollbar-width: none;
            position: sticky;
            top: 56px; z-index: 100;
            background: rgba(7,13,25,0.97);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-chip {
            flex-shrink: 0;
            padding: .45rem 1.1rem;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: #64748b;
            font-family: inherit;
            font-size: .82rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }
        .filter-chip.active {
            background: rgba(6,182,212,0.12);
            border-color: rgba(6,182,212,0.4);
            color: #22d3ee;
        }
        .filter-chip.active[data-gender="girls"] {
            background: rgba(251,113,133,0.12);
            border-color: rgba(251,113,133,0.4);
            color: #fb7185;
        }
        .filter-chip:hover { border-color: rgba(6,182,212,0.3); color: #22d3ee; }

        /* ────── شريط الإحصائيات ────── */
        .accomm-stats-bar {
            display: flex;
            gap: 0.6rem;
            padding: 0.75rem 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #94a3b8;
        }

        /* ────── قسم الدور ────── */
        .floor-section { margin-bottom: 1.5rem; }

        .floor-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 1rem 0.75rem;
        }
        .floor-header-line {
            flex: 1;
            height: 1.5px;
            opacity: 0.25;
            border-radius: 99px;
        }
        .floor-header-label {
            font-size: 0.82rem;
            font-weight: 900;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        /* ────── شبكة الغرف ────── */
        .rooms-grid-v3 {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.75rem;
            padding: 0 0.75rem;
        }

        /* ────── بطاقة الغرفة ────── */
        .room-card-v3 {
            background: rgba(15,23,42,0.75);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.25s ease,
                        border-color 0.25s ease;
        }
        .room-card-v3.boys:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(6,182,212,0.4);
            box-shadow: 0 8px 24px rgba(6,182,212,0.2);
        }
        .room-card-v3.girls:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(251,113,133,0.4);
            box-shadow: 0 8px 24px rgba(251,113,133,0.2);
        }
        .room-card-v3.highlighted {
            animation: roomGlow 1.4s infinite alternate;
        }
        .room-card-v3.highlighted.boys {
            border-color: rgba(6,182,212,0.7) !important;
        }
        .room-card-v3.highlighted.girls {
            border-color: rgba(251,113,133,0.7) !important;
        }
        .room-card-v3.dimmed {
            opacity: 0.35;
            transform: scale(0.97);
        }

        @keyframes roomGlow {
            0%   { box-shadow: 0 0 10px rgba(251,191,36,0.3); }
            100% { box-shadow: 0 0 22px rgba(251,191,36,0.7); }
        }

        /* ─── هيدر البطاقة ─── */
        .room-card-v3-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 12px 10px;
        }
        .room-card-v3-left {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .room-icon-v3 {
            width: 38px; height: 38px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.05rem;
            flex-shrink: 0;
        }
        .room-name-v3 {
            font-size: 0.9rem;
            font-weight: 900;
            color: #f1f5f9;
            line-height: 1.2;
        }
        .room-meta-v3 {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        /* ─── دائرة الإشغال ─── */
        .room-occ-circle {
            width: 46px; height: 46px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .occ-num  { font-size: 1rem; font-weight: 900; line-height: 1; }
        .occ-total { font-size: 0.6rem; font-weight: 700; opacity: 0.6; }

        /* ─── شريط الإشغال ─── */
        .room-occ-bar-wrap {
            height: 3px;
            background: rgba(255,255,255,0.05);
            margin: 0 12px 10px;
            border-radius: 99px;
            overflow: hidden;
        }
        .room-occ-bar {
            height: 100%;
            border-radius: 99px;
            transition: width 0.5s ease;
        }

        /* ─── قائمة الأسرّة ─── */
        .room-beds-list {
            padding: 4px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .bed-row {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 8px;
            border-radius: 11px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .bed-row.occupied.boys   { background: rgba(6,182,212,0.08); border-color: rgba(6,182,212,0.15); }
        .bed-row.occupied.girls  { background: rgba(251,113,133,0.08); border-color: rgba(251,113,133,0.15); }
        .bed-row.empty           { background: rgba(255,255,255,0.02); }

        .bed-num-tag {
            width: 20px; height: 20px;
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: #64748b;
            font-size: 0.65rem;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .bed-person-icon {
            font-size: 0.95rem;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .bed-row.occupied.boys  .bed-person-icon { color: #22d3ee; }
        .bed-row.occupied.girls .bed-person-icon { color: #fb7185; }
        .bed-row.empty          .bed-person-icon { color: #334155; }

        .bed-person-name {
            flex: 1;
            font-size: 0.78rem;
            font-weight: 700;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .bed-row.occupied .bed-person-name { color: #e2e8f0; }

        .bed-occ-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .bed-row.occupied.boys  .bed-occ-dot { background: #22d3ee; box-shadow: 0 0 5px rgba(6,182,212,0.7); }
        .bed-row.occupied.girls .bed-occ-dot { background: #fb7185; box-shadow: 0 0 5px rgba(251,113,133,0.7); }

        /* ────── الغرف في القائمة ────── */
        .rooms-list {
            padding: 0 0 2rem;
        }
    </style>
</head>
<body>
    <div class="bg-layer bg-layer-ambient"></div>
    <div id="app-navbar-slot"></div>

    <header style="padding:1.25rem 1rem .5rem;">
        <div class="page-header-title">🏠 التسكين</div>
        <div class="page-header-sub">الغرف والأسرّة — ابحث عن اسمك</div>
    </header>

    <!-- Filter bar -->
    <div class="filter-bar" role="toolbar">
        <button class="filter-chip active" data-gender="all">كل الغرف</button>
        <button class="filter-chip" data-gender="boys">الدور الأول (ولاد)</button>
        <button class="filter-chip" data-gender="girls">الدور الثاني (بنات)</button>
    </div>

    <!-- Hidden search state + Active search badge -->
    <input type="hidden" id="accomm-search">
    <div id="accomm-active-search-wrap" style="display: none; padding: 0.25rem 1rem 0.5rem;"></div>

    <!-- Rooms list -->
    <div class="rooms-list" id="rooms-list">
        <div class="empty-state">
            <i class="bi bi-house-door"></i>
            <p>بيانات التسكين هتتضاف قريباً من فريق المؤتمر<br>
            ابعت للمسؤول عشان يضيف الغرف والأسماء</p>
        </div>
    </div>

    <!-- Search Popup Overlay (v2.3) -->
    <div class="search-overlay" id="accomm-search-overlay" style="display: none;">
        <!-- 1. صندوق مدخلات البحث -->
        <div class="search-box" id="accomm-search-box">
            <div class="search-box-title"><i class="bi bi-search me-1" style="color:var(--primary-light)"></i> ابحث عن غرفتك</div>
            <p style="font-size:0.75rem; color:var(--text-secondary); margin-bottom:1.25rem;">ادخل اسمك أو رقم الغرفة لمعرفة مكان تسكينك وسريرك فوراً</p>
            <div class="search-wrap mb-3">
                <i class="bi bi-person search-icon"></i>
                <input type="text" id="accomm-popup-search-input" class="search-input" placeholder="اكتب الاسم أو رقم الغرفة..." autocomplete="off">
            </div>
            <div style="display:flex; gap:0.5rem; justify-content:center;">
                <button class="btn-primary-app" id="accomm-popup-search-btn" style="padding:0.5rem 1.25rem; font-size:0.85rem;"><i class="bi bi-search me-1"></i> ابحث</button>
                <button class="btn-primary-app" id="accomm-popup-close-btn" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); box-shadow:none; padding:0.5rem 1.25rem; font-size:0.85rem; color:var(--text-secondary);">إغلاق</button>
            </div>
        </div>

        <!-- 2. صندوق ترحيب النجاح (مثل الأتوبيس) -->
        <div class="search-box" id="accomm-success-box" style="display: none;">
            <div style="font-size: 3rem; margin-bottom: 0.5rem;">🎉</div>
            <div class="search-box-title" id="accomm-success-welcome">أهلاً بك!</div>
            <p style="font-size:0.88rem; color:var(--text-secondary); margin-bottom:1.5rem; line-height: 1.6;" id="accomm-success-desc">
                تم تسكينك في الدور الأول (ولاد)<br>
                رقم غرفتك هي: <strong>105</strong>
            </p>
            <button class="btn-primary-app" id="accomm-success-show-btn" style="width:100%; justify-content:center;"><i class="bi bi-geo-alt-fill me-1"></i> وريني غرفتي</button>
        </div>
    </div>

    <!-- Room Details Modal (v2.3 - Circular) -->
    <div class="modal fade circular-modal" id="roomDetailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="room-modal-title">تفاصيل الغرفة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="room-modal-beds-grid" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="app-bottomnav-slot"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/core.js"></script>
    <script src="../assets/js/data-service.js"></script>
    <script src="../assets/js/accommodation.js"></script>
    <script>
        YC.loadPartials().then(() => {
            const container = document.getElementById('navbar-actions-container');
            if (container) {
                container.innerHTML = `
                    <button id="accomm-nav-search-btn" class="navbar-action animate__animated animate__fadeIn" title="بحث">
                        <i class="bi bi-search"></i>
                    </button>
                `;
                
                // ربط زر البحث العلوي لفتح بوب أب البحث
                document.getElementById('accomm-nav-search-btn')?.addEventListener('click', () => {
                    const overlay = document.getElementById('accomm-search-overlay');
                    const searchBox = document.getElementById('accomm-search-box');
                    const successBox = document.getElementById('accomm-success-box');
                    const popupInput = document.getElementById('accomm-popup-search-input');
                    
                    if (overlay) {
                        overlay.style.display = 'flex';
                        if (searchBox) searchBox.style.display = 'block';
                        if (successBox) successBox.style.display = 'none';
                        setTimeout(() => {
                            if (popupInput) {
                                popupInput.value = document.getElementById('accomm-search')?.value || '';
                                popupInput.focus();
                                popupInput.select();
                            }
                        }, 300);
                    }
                });
            }
        });
    </script>
</body>
</html>
