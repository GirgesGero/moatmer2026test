<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="الألعاب والمسابقات — مؤتمر الشباب 2026">
    <title>الألعاب — مؤتمر الشباب</title>
    <link rel="icon" type="image/png" href="../assets/img/logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <style>
        .games-header {
            padding: 1.5rem 1rem 0.5rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.85rem;
            padding: 0 0.85rem 1.5rem;
        }

        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.75rem 1rem;
            gap: 0.85rem;
            text-decoration: none;
            border-radius: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .game-card:hover  { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .game-card:active { transform: scale(0.97); }

        .game-icon {
            width: 64px; height: 64px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.9rem;
            flex-shrink: 0;
            transition: transform 0.25s;
        }
        .game-card:hover .game-icon { transform: scale(1.12) rotate(-5deg); }

        .game-title {
            font-weight: 800;
            font-size: 1rem;
            line-height: 1.3;
        }

        .game-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* ألوان كل لعبة */
        .gc-memory { border-color: rgba(244,63,94,0.35);  background: rgba(244,63,94,0.08); }
        .gc-memory .game-icon { background: rgba(244,63,94,0.2); color: var(--game-memory); }
        .gc-memory .game-title { color: #fb7185; }
        .gc-memory:hover { box-shadow: 0 8px 32px rgba(244,63,94,0.3); }

        .gc-trivia { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.08); }
        .gc-trivia .game-icon { background: rgba(245,158,11,0.2); color: var(--game-trivia); }
        .gc-trivia .game-title { color: var(--gold-light); }
        .gc-trivia:hover { box-shadow: 0 8px 32px rgba(245,158,11,0.3); }

        .gc-xo { border-color: rgba(139,92,246,0.35); background: rgba(139,92,246,0.08); }
        .gc-xo .game-icon { background: rgba(139,92,246,0.2); color: var(--game-xo); }
        .gc-xo .game-title { color: #a78bfa; }
        .gc-xo:hover { box-shadow: 0 8px 32px rgba(139,92,246,0.3); }

        .gc-maze { border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.08); }
        .gc-maze .game-icon { background: rgba(16,185,129,0.2); color: var(--game-maze); }
        .gc-maze .game-title { color: #34d399; }
        .gc-maze:hover { box-shadow: 0 8px 32px rgba(16,185,129,0.3); }

        /* Section info */
        .games-info {
            margin: 0 0.85rem 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .games-info i { color: var(--primary); font-size: 1.2rem; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="bg-layer bg-layer-ambient"></div>

    <!-- Navbar slot -->
    <div id="app-navbar-slot"></div>

    <!-- Header -->
    <header class="games-header">
        <div class="page-header-title">🎮 الألعاب</div>
        <div class="page-header-sub">استمتع وتسلّى مع زملاءك في المؤتمر</div>
    </header>

    <!-- Info bar -->
    <div class="games-info">
        <i class="bi bi-info-circle-fill"></i>
        <span>الألعاب للتسلية والمسابقة — شارك نتيجتك مع صحابك وشوف مين أحسن!</span>
    </div>

    <!-- Games Grid -->
    <main class="games-grid" id="games-grid">

        <a href="game-memory.html" class="game-card gc-memory" id="game-memory">
            <div class="game-icon">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </div>
            <div>
                <div class="game-title">لعبة الذاكرة</div>
                <div class="game-desc">طابق البطاقات واكسب</div>
            </div>
        </a>

        <a href="game-trivia.html" class="game-card gc-trivia" id="game-trivia">
            <div class="game-icon">
                <i class="bi bi-question-circle-fill"></i>
            </div>
            <div>
                <div class="game-title">المسابقة الدينية</div>
                <div class="game-desc">اختبر معلوماتك الكنسية</div>
            </div>
        </a>

        <a href="game-xo.html" class="game-card gc-xo" id="game-xo">
            <div class="game-icon">
                <i class="bi bi-x-circle-fill"></i>
            </div>
            <div>
                <div class="game-title">XO الكلاسيكي</div>
                <div class="game-desc">العب ضد الجهاز أو صاحبك</div>
            </div>
        </a>

        <a href="game-maze.html" class="game-card gc-maze" id="game-maze">
            <div class="game-icon">
                <i class="bi bi-signpost-split-fill"></i>
            </div>
            <div>
                <div class="game-title">المتاهة</div>
                <div class="game-desc">ادخل وطلع من المتاهة</div>
            </div>
        </a>

    </main>

    <!-- Bottom Nav slot -->
    <div id="app-bottomnav-slot"></div>

    <script src="../assets/js/core.js"></script>
    <script>
        YC.loadPartials();

        // تأثير ظهور البطاقات
        document.querySelectorAll('.game-card').forEach((card, i) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(18px)';
            setTimeout(() => {
                card.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 60 + i * 80);
        });
    </script>
</body>
</html>
