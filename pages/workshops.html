<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="ورش عمل مؤتمر الشباب 2026">
    <title>ورش العمل — مؤتمر الشباب</title>
    <link rel="icon" type="image/png" href="../assets/img/logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/content-cards.css">
    <style>
        .day-tabs { display:flex; gap:.5rem; padding:.75rem 1rem; overflow-x:auto; scrollbar-width:none; position:sticky; top:56px; z-index:100; background:rgba(7,13,25,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border-subtle); }
        .day-tabs::-webkit-scrollbar { display:none; }
        .day-tab { flex-shrink:0; padding:.5rem 1.2rem; border-radius:20px; border:1px solid var(--border-light); background:transparent; color:var(--text-muted); font-family:inherit; font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap; }
        .day-tab:hover { border-color:rgba(244,63,94,.4); color:#fb7185; }
        .day-tab.active { background:rgba(244,63,94,.1); border-color:rgba(244,63,94,.35); color:#fb7185; }
        .day-panel { display:none; padding:1rem; }
        .day-panel.active { display:block; }
        .workshop-card { background:var(--glass-bg); border:1px solid var(--border-light); border-radius:18px; padding:1.1rem 1.25rem; margin-bottom:.75rem; cursor:pointer; transition:transform .18s, box-shadow .18s, border-color .18s; }
        .workshop-card:hover { transform:translateX(-3px); box-shadow:var(--shadow-md); border-color:rgba(244,63,94,.35); }
        .ws-icon { width:42px; height:42px; border-radius:12px; background:rgba(244,63,94,.12); color:#fb7185; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
        .lecture-modal .modal-content { background:var(--bg-dark); border:1px solid var(--border-light); border-radius:20px; color:var(--text-main); }
        .lecture-modal .modal-header { border-bottom:1px solid var(--border-subtle); }
        .lecture-modal .modal-header .btn-close { filter:invert(1); }
        .skill-chip { display:inline-block; background:rgba(244,63,94,.1); border:1px solid rgba(244,63,94,.3); color:#fb7185; border-radius:20px; padding:.25rem .75rem; font-size:.78rem; margin:.2rem; }
    </style>
</head>
<body>
    <div class="bg-layer bg-layer-ambient"></div>
    <div id="app-navbar-slot"></div>

    <header style="padding:1.25rem 1rem .5rem">
        <div class="page-header-title">🛠️ ورش العمل</div>
        <div class="page-header-sub">تطبيقات عملية ومهارات لكل يوم</div>
    </header>

    <div class="day-tabs" role="tablist">
        <button class="day-tab active" data-day="1">اليوم الأول</button>
        <button class="day-tab" data-day="2">اليوم الثاني</button>
        <button class="day-tab" data-day="3">اليوم الثالث</button>
    </div>

    <main id="workshops-main">
        <div class="day-panel active" id="ws-panel-day-1"></div>
        <div class="day-panel" id="ws-panel-day-2"></div>
        <div class="day-panel" id="ws-panel-day-3"></div>
    </main>

    <div class="modal fade lecture-modal" id="workshopModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="ws-modal-title">عنوان الورشة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="ws-modal-body"></div>
            </div>
        </div>
    </div>

    <div id="app-bottomnav-slot"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/core.js"></script>
    <script src="../assets/js/workshops.js"></script>
    <script>YC.loadPartials();</script>
</body>
</html>
