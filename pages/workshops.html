<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="ورش عمل مؤتمر الشباب 2026">
    <title>ورش العمل — مؤتمر الشباب</title>
    <link rel="icon" type="image/png" href="../assets/img/logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css?v=2.6">
    <link rel="stylesheet" href="../assets/css/content-cards.css?v=2.6">
    <style>
        .day-tabs { display:flex; gap:.5rem; padding:.75rem 1rem; overflow-x:auto; scrollbar-width:none; position:sticky; top:56px; z-index:100; background:rgba(7,13,25,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border-subtle); }
        .day-tabs::-webkit-scrollbar { display:none; }
        .day-tab { flex-shrink:0; padding:.5rem 1.2rem; border-radius:20px; border:1px solid var(--border-light); background:transparent; color:var(--text-muted); font-family:inherit; font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; white-space:nowrap; }
        .day-tab:hover { border-color:rgba(244,63,94,.4); color:#fb7185; }
        .day-tab.active { background:rgba(244,63,94,.1); border-color:rgba(244,63,94,.35); color:#fb7185; }
        .day-panel { display:none; padding:1.25rem 1rem; }
        .day-panel.active { display:block; }
        .workshop-card { 
            background: linear-gradient(135deg, rgba(251, 113, 133, 0.03) 0%, rgba(15, 23, 42, 0.8) 100%); 
            border: 1.5px solid rgba(251, 113, 133, 0.15); 
            border-radius: 24px; 
            padding: 1.5rem; 
            margin-bottom: 1.2rem; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .workshop-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, #fb7185, transparent);
            opacity: 0.5;
        }
        .workshop-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 35px rgba(251, 113, 133, 0.15), 0 0 20px rgba(251, 113, 133, 0.1); 
            border-color: rgba(251, 113, 133, 0.45); 
        }
        .ws-icon { 
            width: 48px; 
            height: 48px; 
            border-radius: 16px; 
            background: linear-gradient(135deg, rgba(251, 113, 133, 0.25) 0%, rgba(251, 113, 133, 0.05) 100%); 
            color: #fb7185; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.4rem; 
            flex-shrink: 0; 
            border: 1px solid rgba(251, 113, 133, 0.3);
            box-shadow: 0 4px 10px rgba(251, 113, 133, 0.15);
        }
        .lecture-modal .modal-content { background: radial-gradient(circle at top right, #111827 0%, #070d19 100%); border: 1.5px solid rgba(251, 113, 133, 0.25); border-radius: 28px; color: var(--text-main); box-shadow: 0 25px 50px rgba(0,0,0,0.6), 0 0 30px rgba(251, 113, 133, 0.15); }
        .lecture-modal .modal-header { border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding: 1.5rem 1.5rem 1rem; }
        .lecture-modal .modal-header .btn-close { filter: invert(1); opacity: 0.7; }
        .lecture-modal .modal-body { padding: 1.5rem; }
        .objective-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 0.9rem 1.1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.25s ease;
        }
        .objective-item:hover {
            background: rgba(251, 113, 133, 0.04);
            border-color: rgba(251, 113, 133, 0.2);
            transform: translateX(-3px);
        }
        .objective-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(251, 113, 133, 0.15);
            color: #fb7185;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            border: 1px solid rgba(251, 113, 133, 0.25);
        }
        .objective-text {
            font-size: 0.9rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
        }
        .practical-box {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.05) 0%, rgba(6, 182, 212, 0.01) 100%);
            border: 1px solid rgba(6, 182, 212, 0.15);
            border-radius: 18px;
            padding: 1.1rem;
            font-size: 0.88rem;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
        }
        .practical-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; width: 4px;
            background: #06b6d4;
        }
    </style>
</head>
<body>
    <div class="bg-layer bg-layer-ambient"></div>
    <div id="app-navbar-slot"></div>

    <header style="padding:1.25rem 1rem .5rem">
        <div class="page-header-title">🛠️ ورش العمل</div>
        <div class="page-header-sub">تطبيقات عملية ومهارات لكل يوم</div>
    </header>

    <div class="day-tabs" role="tablist">
        <button class="day-tab active" data-day="1">اليوم الأول</button>
        <button class="day-tab" data-day="2">اليوم الثاني</button>
        <button class="day-tab" data-day="3">اليوم الثالث</button>
    </div>

    <main id="workshops-main">
        <div class="day-panel active" id="ws-panel-day-1"></div>
        <div class="day-panel" id="ws-panel-day-2"></div>
        <div class="day-panel" id="ws-panel-day-3"></div>
    </main>

    <div class="modal fade lecture-modal" id="workshopModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="ws-modal-title">عنوان الورشة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="ws-modal-body"></div>
            </div>
        </div>
    </div>

    <div id="app-bottomnav-slot"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/core.js?v=2.6"></script>
    <script src="../assets/js/workshops.js?v=2.6"></script>
    <script>YC.loadPartials();</script>
</body>
</html>
