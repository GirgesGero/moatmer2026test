<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="الداشبورد الرئيسي لمؤتمر الشباب 2026 — كل أقسام المؤتمر في مكان واحد">
    <title>مؤتمر الشباب 2026 — الرئيسية</title>
    <link rel="icon" type="image/png" href="../assets/img/logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/home.css">
</head>
<body>

    <!-- خلفية محيطية -->
    <div class="bg-layer bg-layer-ambient"></div>

    <!-- Navbar slot -->
    <div id="app-navbar-slot"></div>

    <!-- ════ الحاوية الرئيسية (flex column) ════ -->
    <div class="home-main">

        <!-- Hero Strip (مضغوط) -->
        <section class="home-hero-strip" aria-label="رأس الصفحة">
            <img src="../assets/img/%D9%84%D9%88%D8%AC%D9%88%20%D8%A7%D9%84%D9%85%D8%A4%D8%AA%D9%85%D8%B1%20.png" alt="لوجو مؤتمر الشباب" class="hero-logo-sm">
            <div class="hero-text-wrap">
                <h1 class="home-greeting" id="main-greeting">أهلاً بك في مؤتمر الشباب ❤️</h1>
                <p class="home-greeting-sub">مؤتمر خلطبيطة بالصلصة 2026 — كنيسة مارمرقس الرسول بالمنشية</p>
            </div>
        </section>

        <!-- Live Activity Compact (الآن / بعد) -->
        <div class="live-compact" id="live-compact" style="display:none" role="status" aria-live="polite">
            <div class="lc-section">
                <span class="lc-badge now">الآن</span>
                <span class="lc-title" id="lp-now-title">—</span>
                <span class="lc-time"  id="lp-now-remaining"></span>
            </div>
            <div class="lc-section" id="lp-next-wrap">
                <span class="lc-badge next">بعد</span>
                <span class="lc-title" id="lp-next-title">—</span>
                <span class="lc-time"  id="lp-next-in"></span>
            </div>
        </div>

        <!-- ════ Dashboard Dial (يملأ ما تبقى) ════ -->
        <div class="dial-wrapper" id="dash-wheel-container" aria-label="قائمة الأقسام الدائرية">

            <!-- الدائرة الضخمة من الجانب الأيمن -->
            <div class="dial-outer-ring" id="dial-outer-ring">
                <svg viewBox="0 0 300 300" width="100%" height="100%" class="dial-svg">
                    <defs>
                        <!-- Gradients to make segments look premium -->
                        <radialGradient id="grad-lectures" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#0284c7" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#0284c7" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#0284c7" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-workshops" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#0d9488" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#0d9488" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#0d9488" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-hymns" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#d97706" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#d97706" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#d97706" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-program" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#ea580c" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#ea580c" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#ea580c" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-accomm" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#c026d3" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#c026d3" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#c026d3" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-buses" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#2563eb" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#2563eb" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#2563eb" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-prayer" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#db2777" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#db2777" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#db2777" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-games" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#7c3aed" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#7c3aed" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-feedback" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#10b981" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#10b981" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#10b981" stop-opacity="0.45" />
                        </radialGradient>
                        <radialGradient id="grad-groups" cx="150" cy="150" r="140" gradientUnits="userSpaceOnUse">
                            <stop offset="58%" stop-color="#4f46e5" stop-opacity="0.05" />
                            <stop offset="85%" stop-color="#4f46e5" stop-opacity="0.28" />
                            <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.45" />
                        </radialGradient>

                        <!-- Glow Filter for active segment -->
                        <filter id="svg-glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>

                    <!-- Rotating Wheel Group (10 Sections, 36 degrees each) -->
                    <g id="dial-wheel" class="dial-wheel">
                        <!-- Sector 0: Lectures (Cyan) -->
                        <g class="dial-node" data-index="0" data-href="lectures.html" transform="rotate(270, 150, 150)">
                            <path class="svg-sector sector-cyan" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-lectures)" stroke="#0284c7" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🎤</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">المحاضرات</text>
                        </g>
                        <!-- Sector 1: Workshops (Teal) -->
                        <g class="dial-node" data-index="1" data-href="workshops.html" transform="rotate(306, 150, 150)">
                            <path class="svg-sector sector-teal" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-workshops)" stroke="#0d9488" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🛠</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">ورش العمل</text>
                        </g>
                        <!-- Sector 2: Hymns (Gold) -->
                        <g class="dial-node" data-index="2" data-href="hymns.html" transform="rotate(342, 150, 150)">
                            <path class="svg-sector sector-gold" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-hymns)" stroke="#d97706" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🎵</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">الترانيم</text>
                        </g>
                        <!-- Sector 3: Program (Orange) -->
                        <g class="dial-node" data-index="3" data-href="program.html" transform="rotate(18, 150, 150)">
                            <path class="svg-sector sector-orange" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-program)" stroke="#ea580c" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🗓</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">البرنامج</text>
                        </g>
                        <!-- Sector 4: Accommodation (Magenta) -->
                        <g class="dial-node" data-index="4" data-href="accommodation.html" transform="rotate(54, 150, 150)">
                            <path class="svg-sector sector-magenta" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-accomm)" stroke="#c026d3" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🛏</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">التسكين</text>
                        </g>
                        <!-- Sector 5: Buses (Blue) -->
                        <g class="dial-node" data-index="5" data-href="buses.html" transform="rotate(90, 150, 150)">
                            <path class="svg-sector sector-blue" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-buses)" stroke="#2563eb" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🚌</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">الأتوبيسات</text>
                        </g>
                        <!-- Sector 6: Prayer (Pink/Red) -->
                        <g class="dial-node" data-index="6" data-href="prayer.html" transform="rotate(126, 150, 150)">
                            <path class="svg-sector sector-pink" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-prayer)" stroke="#db2777" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🙏</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">الصلوات</text>
                        </g>
                        <!-- Sector 7: Games (Purple) -->
                        <g class="dial-node" data-index="7" data-href="games.html" transform="rotate(162, 150, 150)">
                            <path class="svg-sector sector-purple" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-games)" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">🎮</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">الألعاب</text>
                        </g>
                        <!-- Sector 8: Feedback (Emerald) -->
                        <g class="dial-node" data-index="8" data-href="feedback.html" transform="rotate(198, 150, 150)">
                            <path class="svg-sector sector-emerald" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-feedback)" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">💬</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">شارك رأيك</text>
                        </g>
                        <!-- Sector 9: Groups (Indigo) -->
                        <g class="dial-node" data-index="9" data-href="groups.html" transform="rotate(234, 150, 150)">
                            <path class="svg-sector sector-indigo" d="M 283.15 106.74 A 140 140 0 0 1 283.15 193.26 L 230.84 176.27 A 85 85 0 0 0 230.84 123.73 Z" fill="url(#grad-groups)" stroke="#4f46e5" stroke-width="1.2" stroke-opacity="0.75" />
                            <text x="270" y="150" transform="rotate(90, 270, 150)" class="svg-icon">👥</text>
                            <text x="242" y="150" transform="rotate(90, 242, 150)" class="svg-label">المجموعات</text>
                        </g>
                    </g>

                    <!-- Static Hub and Gear Overlay (Does not rotate) -->
                    <!-- Gear teeth (dashed thick stroke) -->
                    <circle cx="150" cy="150" r="77" fill="none" stroke="#101827" stroke-width="10" stroke-dasharray="6 6" />
                    <!-- Inner gear neon line -->
                    <circle cx="150" cy="150" r="72" fill="none" stroke="#22d3ee" stroke-width="1.5" filter="drop-shadow(0 0 3px #22d3ee)" stroke-opacity="0.85" />
                    <!-- Hub Center Background -->
                    <circle cx="150" cy="150" r="71" fill="#040812" />

                    <!-- Statically positioned pointer at 180 degrees (left side, pointing right) -->
                    <path d="M 4 143 L 13 150 L 4 157 Z" fill="#22d3ee" stroke="#22d3ee" stroke-width="1.5" filter="drop-shadow(0 0 4px #22d3ee)" />
                </svg>

                <!-- HTML Logo Centered inside Hub -->
                <div class="dial-hub">
                    <div class="dial-hub-logo-wrap">
                        <img src="../assets/img/%D9%84%D9%88%D8%AC%D9%88%20%D8%A7%D9%84%D9%85%D8%A4%D8%AA%D9%85%D8%B1%20.png" alt="شعار المؤتمر" class="dial-hub-logo">
                    </div>
                </div>
            </div>

            <!-- ════ بادج القسم النشط (بجانب السهم) ════ -->
            <div class="dial-active-badge" id="dial-active-badge" role="link" tabindex="0" aria-label="اضغط لفتح القسم">

                <!-- مؤشر الذروة -->
                <div class="dab-indicator">
                    <div class="dab-dot"></div>
                    <div class="dab-vline"></div>
                </div>

                <!-- أيقونة القسم -->
                <span class="dab-icon" id="dab-icon">🎤</span>

                <!-- اسم القسم -->
                <div class="dab-name" id="dab-name">المحاضرات الروحية</div>

                <!-- وصف مختصر -->
                <div class="dab-desc" id="dab-desc">محاضرات الأيام الثلاثة</div>

                <!-- تلميح الدخول -->
                <div class="dab-enter">
                    <i class="bi bi-arrow-left-circle-fill"></i> اضغط للدخول
                </div>

                <!-- سهم واصل للدائرة -->
                <div class="dab-connector">
                    <div class="dab-h-line"></div>
                    <span class="dab-h-arrow">›</span>
                </div>
            </div>

            <!-- أزرار التنقل (أعلى / أسفل) -->
            <button class="dial-nav-btn dial-nav-up"   id="dial-btn-up"   aria-label="القسم السابق">
                <i class="bi bi-chevron-up"></i>
            </button>
            <button class="dial-nav-btn dial-nav-down" id="dial-btn-down" aria-label="القسم التالي">
                <i class="bi bi-chevron-down"></i>
            </button>

        </div>
        <!-- /dial-wrapper -->

        <!-- Dots -->
        <div class="dial-footer">
            <div class="dial-dots" role="tablist">
                <span class="dial-dot active" data-index="0" role="tab"></span>
                <span class="dial-dot"        data-index="1" role="tab"></span>
                <span class="dial-dot"        data-index="2" role="tab"></span>
                <span class="dial-dot"        data-index="3" role="tab"></span>
                <span class="dial-dot"        data-index="4" role="tab"></span>
                <span class="dial-dot"        data-index="5" role="tab"></span>
                <span class="dial-dot"        data-index="6" role="tab"></span>
                <span class="dial-dot"        data-index="7" role="tab"></span>
                <span class="dial-dot"        data-index="8" role="tab"></span>
                <span class="dial-dot"        data-index="9" role="tab"></span>
            </div>
            <div class="dial-swipe-hint" aria-hidden="true">
                <i class="bi bi-hand-index-thumb"></i> اسحب للتنقل
            </div>
        </div>

    </div>
    <!-- /home-main -->

    <!-- Bottom Nav slot -->
    <div id="app-bottomnav-slot"></div>

    <script src="../assets/js/core.js"></script>
    <script src="../assets/js/home.js"></script>

</body>
</html>
