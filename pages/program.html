<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="برنامج مؤتمر الشباب 2026 — جدول الأيام الثلاثة">
    <title>البرنامج — مؤتمر الشباب</title>
    <link rel="icon" type="image/png" href="../assets/img/logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body>
    <div class="bg-layer bg-layer-ambient"></div>
    <div id="app-navbar-slot"></div>

    <header style="padding:1.25rem 1rem .5rem; display:flex; align-items:flex-start; justify-content:space-between;">
        <div>
            <div class="page-header-title">📅 البرنامج</div>
            <div class="page-header-sub">جدول مؤتمر الشباب لكل يوم</div>
        </div>
        <button id="jump-now-btn" class="btn-primary-app" style="padding:.5rem 1rem;font-size:.8rem;margin-top:.5rem" title="انتقل للنشاط الحالي">
            <i class="bi bi-clock-fill"></i> الآن
        </button>
    </header>

    <!-- Live Status Widget -->
    <div class="live-status-card" id="live-status-widget" style="display: none;">
        <div class="live-badge-now">
            <span class="blink-dot"></span>
            الآن
        </div>
        <div class="live-title" id="live-activity-title">تحميل الفعالية الجارية...</div>
        <div class="live-progress-container">
            <div class="live-progress-text">
                <span id="live-time-left">متبقي --:--</span>
                <span id="live-progress-percent">0%</span>
            </div>
            <div class="live-progress-bar-track">
                <div class="live-progress-bar-fill" id="live-progress-bar-fill" style="width: 0%;"></div>
            </div>
        </div>
        <div class="live-next-teaser" id="live-next-teaser">
            <i class="bi bi-chevron-double-left"></i>
            <span id="live-next-activity-text">النشاط التالي: جارِ الحساب...</span>
        </div>
    </div>

    <!-- Day Tabs -->
    <div class="day-tabs" role="tablist">
        <!-- يتم توليد التابات ديناميكياً من الجافاسكريبت -->
    </div>

    <!-- Filter Pills -->
    <div class="filter-pills-bar" role="toolbar" aria-label="فلاتر الأنشطة">
        <button class="filter-pill active" data-filter="all"><i class="bi bi-grid-fill"></i>الكل</button>
        <button class="filter-pill" data-filter="starred" style="border-color:#fbbf24;color:#fbbf24;"><i class="bi bi-star-fill"></i>جدولي</button>
        <button class="filter-pill" data-filter="prayer"><i class="bi bi-book-fill"></i>صلوات</button>
        <button class="filter-pill" data-filter="lecture"><i class="bi bi-mic-fill"></i>محاضرات</button>
        <button class="filter-pill" data-filter="workshop"><i class="bi bi-tools"></i>ورش</button>
        <button class="filter-pill" data-filter="free"><i class="bi bi-emoji-smile-fill"></i>ترفيه</button>
        <button class="filter-pill" data-filter="meal"><i class="bi bi-cup-hot-fill"></i>وجبات</button>
    </div>

    <!-- Day Panels -->
    <main id="program-main">
        <div class="day-panel active" id="prog-panel-day-1">
            <div class="timeline" id="timeline-day-1"></div>
        </div>
        <div class="day-panel" id="prog-panel-day-2">
            <div class="timeline" id="timeline-day-2"></div>
        </div>
        <div class="day-panel" id="prog-panel-day-3">
            <div class="timeline" id="timeline-day-3"></div>
        </div>
        <div class="day-panel" id="prog-panel-day-4">
            <div class="timeline" id="timeline-day-4"></div>
        </div>
    </main>

    <div id="app-bottomnav-slot"></div>

    <script src="../assets/js/core.js"></script>
    <script src="../assets/js/program.js"></script>
    <script>YC.loadPartials();</script>
<script src="../assets/js/bg-3d.js?v=3.0" defer></script>
</body>
</html>
